  <script>
    // ============================================================
    // PWA インストールプロンプト管理
    // ============================================================

    // Mark body so CSS can hide noscript-like content after Flutter loads
    document.body.classList.add('flutter-loaded');

    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window._pwaInstallable = true;
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      window._pwaInstallable = false;
      window._pwaInstalled = true;
    });

    window.triggerPwaInstall = async function() {
      if (!deferredPrompt) return false;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      window._pwaInstallable = false;
      return outcome === 'accepted';
    };

    window._isPwaStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;

    window._isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());

    // ── Service Worker 登録（オフラインフォールバック） ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function (err) {
        console.warn('[SW] Registration failed:', err);
      });
    }
  </script>
