<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A1A1A">
  <title>OtakuIQ — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0C;
      color: #E8E8E6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
      letter-spacing: -1px;
      font-weight: 800;
      color: #FAFAF8;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
      opacity: 0.7;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #FAFAF8;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 14px;
      color: #9A9A98;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-block;
      background: #FAFAF8;
      color: #0A0A0C;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }

    .retry-btn:hover { opacity: 0.85; }
    .retry-btn:active { opacity: 0.7; }

    @media (prefers-color-scheme: light) {
      body { background: #EEEEEC; color: #1A1A1A; }
      .logo { color: #1A1A1A; }
      h1 { color: #1A1A1A; }
      p { color: #6A6A68; }
      .retry-btn { background: #1A1A1A; color: #FAFAF8; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">OtakuIQ</div>
    <span class="icon">📡</span>
    <h1>You're offline</h1>
    <p>
      No internet connection detected.<br>
      Check your connection and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
